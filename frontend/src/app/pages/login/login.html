<div class="login-fullscreen-container">
  <div class="login-card-panel">
    
    <div class="login-header">
      <div class="login-logo-placeholder">Logo</div>
      <h2 class="login-title">School Admin Portal</h2>
      <p class="login-subtitle">Reporting Service</p>
    </div>

    <div class="login-form">
      <div class="input-group">
        <label class="input-label">Email Address</label>
        <input 
          type="email" 
          placeholder="name@school.edu.ph" 
          [(ngModel)]="email" 
          class="login-input" 
        />
      </div>

      <div class="input-group">
        <label class="input-label">Password</label>
        <input 
          type="password" 
          placeholder="••••••••" 
          [(ngModel)]="password" 
          class="login-input" 
        />
      </div>

      <button class="login-submit-btn" (click)="onLogin()">
        Sign In
      </button>
    </div>

  </div>
</div>
