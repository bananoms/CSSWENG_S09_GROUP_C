<div class="archives-container">
  
  <div class="page-header">
    <h2 class="page-title">Report Archives</h2>
  </div>

  <div class="archives-section">
    <div class="section-header-row">
      <h3 class="section-heading">Historical Document Roster</h3>
    </div>

    <div class="table-responsive">
      <table class="dashboard-table">
        <thead>
          <tr>
            <th>Report Name</th>
            <th>Template</th>
            <th>Generated By</th>
            <th>Date Generated</th>
            <th>Status</th>
            <th class="text-right">Action</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let a of archives">
            <td class="font-semibold">{{ a.name }}</td>
            <td>{{ a.template }}</td>
            <td>{{ a.by }}</td>
            <td>{{ a.date }}</td>
            <td>
              <span class="status-badge" [class.completed]="a.status === 'Completed'">
                {{ a.status }}
              </span>
            </td>
            <td class="text-right">
              <button class="table-action-btn" (click)="download(a)">
                <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"/>
                  <polyline points="7 10 12 15 17 10"/>
                  <line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
                Download
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>
