<h2>Dashboard</h2>

<section>
  <h3>Students</h3>
  <table border="1" cellpadding="8" width="100%">
    <thead>
      <tr><th>Student ID</th><th>Name</th><th>Section</th><th>CGPA</th><th>Status</th></tr>
    </thead>
    <tbody>
      <tr *ngFor="let s of students">
        <td>{{ s.id }}</td>
        <td>{{ s.name }}</td>
        <td>{{ s.section }}</td>
        <td>{{ s.cgpa }}</td>
        <td>{{ s.status }}</td>
      </tr>
    </tbody>
  </table>
</section>

<section>
  <h3>Reports Generated</h3>
  <table border="1" cellpadding="8" width="100%">
    <thead>
      <tr><th>Report Name</th><th>Type</th><th>Generated By</th><th>Date</th></tr>
    </thead>
    <tbody>
      <tr *ngFor="let r of reports">
        <td>{{ r.name }}</td>
        <td>{{ r.type }}</td>
        <td>{{ r.by }}</td>
        <td>{{ r.date }}</td>
      </tr>
    </tbody>
  </table>
</section>
