<h2>Report Archives</h2>
<table border="1" cellpadding="8" width="100%">
  <thead>
    <tr><th>Report Name</th><th>Template</th><th>Generated By</th><th>Date</th><th>Status</th><th>Action</th></tr>
  </thead>
  <tbody>
    <tr *ngFor="let a of archives">
      <td>{{ a.name }}</td>
      <td>{{ a.template }}</td>
      <td>{{ a.by }}</td>
      <td>{{ a.date }}</td>
      <td>{{ a.status }}</td>
      <td><button (click)="download(a)">Download</button></td>
    </tr>
  </tbody>
</table>
